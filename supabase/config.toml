# Minimal Supabase CLI config for applying migrations to your linked project.
# The project_id below is a LOCAL label only — it is NOT a secret and NOT your
# project ref. You link the real project with:
#   npx supabase login
#   npx supabase link --project-ref <your-project-ref>
#   npx supabase db push
project_id = "avonpc"

[db]
# Postgres major version of your Supabase project (Supabase currently runs 15+).
major_version = 15
